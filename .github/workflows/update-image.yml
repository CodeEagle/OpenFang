# OpenFang Image Update Workflow
name: Update OpenFang Image

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if no new version"
        required: false
        default: false
        type: boolean
      target_version:
        description: "Target version to build (e.g., 0.3.3). Leave empty for latest."
        required: false
        default: ""
        type: string
      publish_to_store:
        description: "Publish to LazyCat App Store"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 */6 * * *"

env:
  UPSTREAM_REPO: RightNow-AI/openfang
  PROJECT_NAME: OpenFang
  PROJECT_NAME_LOWER: openfang
  OFFICIAL_IMAGE_REGISTRY: ""
  PRECOMPILED_BINARY_URL: https://github.com/RightNow-AI/openfang/releases/download/v$LATEST_VERSION/openfang-x86_64-unknown-linux-gnu.tar.gz
  DOCKERFILE_TYPE: simple
  SERVICE_PORT: "4200"
  SERVICE_CMD: '["openfang", "start"]'

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install source build dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Get latest package version
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_VERSION="${{ inputs.target_version }}"

          if [ -n "$TARGET_VERSION" ]; then
            SOURCE_VERSION="$TARGET_VERSION"
            LATEST_VERSION="${TARGET_VERSION#v}"
            echo "Using specified version: $SOURCE_VERSION"

            # 获取该版本的 release notes
            RELEASE_DATA=$(gh api "repos/${{ env.UPSTREAM_REPO }}/releases/tags/${SOURCE_VERSION}" 2>/dev/null || echo "")
            if [ -n "$RELEASE_DATA" ]; then
              RELEASE_NOTES=$(echo "$RELEASE_DATA" | jq -r '.body')
            else
              RELEASE_NOTES="Build version $LATEST_VERSION"
            fi
          else
            # 获取最新版本
            RELEASE_DATA=$(gh api repos/${{ env.UPSTREAM_REPO }}/releases/latest 2>/dev/null || echo "")

            if [ -z "$RELEASE_DATA" ]; then
              echo "No release found"
              exit 1
            fi

            LATEST_VERSION=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
            LATEST_VERSION=${LATEST_VERSION#v}
            RELEASE_NOTES=$(echo "$RELEASE_DATA" | jq -r '.body')
            echo "Latest version found: $LATEST_VERSION"
            SOURCE_VERSION="v$LATEST_VERSION"
          fi

          echo "source_version=$SOURCE_VERSION" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT

          # 保存 release notes 到文件（处理多行内容）
          echo "$RELEASE_NOTES" > /tmp/release_notes.txt
          echo "release_notes_file=/tmp/release_notes.txt" >> $GITHUB_OUTPUT

      - name: Check if update needed
        id: check-update
        run: |
          CURRENT_IMAGE=$(grep 'image:' lzc-manifest.yml | head -1 | awk '{print $2}')
          echo "Current image: $CURRENT_IMAGE"

          LATEST_VERSION="${{ steps.get-version.outputs.latest_version }}"
          FORCE_BUILD="${{ inputs.force_build }}"
          TARGET_VERSION="${{ inputs.target_version }}"

          if [ -n "$TARGET_VERSION" ]; then
            # 指定版本时总是构建
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "Target version specified: $TARGET_VERSION"
          elif [ "$FORCE_BUILD" = "true" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "Force build requested"
          elif [ -n "$LATEST_VERSION" ] && [[ "$CURRENT_IMAGE" != *"$LATEST_VERSION"* ]]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "New version available: $LATEST_VERSION"
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "Already on latest version"
          fi

      - name: Login to GHCR
        if: steps.check-update.outputs.update_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.check-update.outputs.update_needed == 'true'
        id: build-image
        run: |
          LATEST_VERSION="${{ steps.get-version.outputs.latest_version }}"
          SOURCE_VERSION="${{ steps.get-version.outputs.source_version }}"
          LOCAL_IMAGE_WITH_V="ghcr.io/${{ github.repository }}:${SOURCE_VERSION}"
          LOCAL_IMAGE_WITH_V=$(echo "$LOCAL_IMAGE_WITH_V" | tr '[:upper:]' '[:lower:]')
          LOCAL_IMAGE_PLAIN="ghcr.io/${{ github.repository }}:${LATEST_VERSION}"
          LOCAL_IMAGE_PLAIN=$(echo "$LOCAL_IMAGE_PLAIN" | tr '[:upper:]' '[:lower:]')

          # 检查是否配置了官方镜像
          if [ -n "${{ env.OFFICIAL_IMAGE_REGISTRY }}" ]; then
            SOURCE_IMAGE="${{ env.OFFICIAL_IMAGE_REGISTRY }}:$LATEST_VERSION"
            echo "Pulling official image: $SOURCE_IMAGE"
            if docker pull "$SOURCE_IMAGE" 2>/dev/null; then
              docker tag "$SOURCE_IMAGE" "$LOCAL_IMAGE_WITH_V"
              docker tag "$SOURCE_IMAGE" "$LOCAL_IMAGE_PLAIN"
              docker push "$LOCAL_IMAGE_WITH_V"
              docker push "$LOCAL_IMAGE_PLAIN"
              exit 0
            fi
          fi

          # 无官方镜像或官方镜像不存在，尝试从预编译二进制构建
          if [ -n "${{ env.PRECOMPILED_BINARY_URL }}" ]; then
            echo "Building from precompiled binary..."
            
            # 下载预编译二进制
            BINARY_URL="${{ env.PRECOMPILED_BINARY_URL }}"
            BINARY_URL="${BINARY_URL//\$LATEST_VERSION/$LATEST_VERSION}"
            echo "Downloading binary from: $BINARY_URL"
            
            mkdir -p /tmp/build
            cd /tmp/build

            if curl -fsI "$BINARY_URL" >/dev/null 2>&1; then
              if [[ "$BINARY_URL" == *.tar.gz ]] || [[ "$BINARY_URL" == *.tgz ]]; then
                curl -fsSL "$BINARY_URL" | tar xz
              elif [[ "$BINARY_URL" == *.zip ]]; then
                curl -fsSL "$BINARY_URL" -o binary.zip
                unzip binary.zip
              else
                curl -fsSL "$BINARY_URL" -o ${{ env.PROJECT_NAME_LOWER }}
              fi
            else
              echo "Precompiled binary not found, falling back to source build..."
              cd /tmp
              rm -rf openfang-src
              git clone --depth 1 --branch "$SOURCE_VERSION" "https://github.com/${{ env.UPSTREAM_REPO }}.git" openfang-src
              cd openfang-src
              cargo build --release --bin openfang
              cp target/release/openfang /tmp/build/openfang
              cd /tmp/build
            fi
            
            # 复制项目中的 Dockerfile（包含 Hands 依赖）
            cp ${{ github.workspace }}/Dockerfile .

            # 复制 setup 目录
            cp -r ${{ github.workspace }}/setup .
            
            # 构建并推送镜像
            docker build -t "$LOCAL_IMAGE_WITH_V" -t "$LOCAL_IMAGE_PLAIN" .
            docker push "$LOCAL_IMAGE_WITH_V"
            docker push "$LOCAL_IMAGE_PLAIN"
          else
            echo "No official image configured and no precompiled binary URL set"
            exit 1
          fi

      - name: Print pushed image
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          echo "Built and pushed image: ghcr.io/${{ github.repository }}:${{ steps.get-version.outputs.source_version }}"
