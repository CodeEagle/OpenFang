lzc-sdk-version: '0.1'
package: com.selfstudio.openfang
version: 0.3.3
min_os_version: 1.3.8
name: OpenFang
description: (LazyCat Auto-build) Open-source Agent Operating System - autonomous agents that work for you
license: MIT
homepage: https://openfang.sh
author: RightNow-AI
application:
  subdomain: openfang
  public_path:
    - /
  error_page:
    - /lzcapp/pkg/content/index.html
  upstreams:
    - location: /
      backend: http://openfang:4200/
services:
  openfang:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/openfang:62160d016b29db33
    # 启动前创建默认配置文件
    setup_script: |
      mkdir -p /root/.openfang
      CONFIG_FILE="/root/.openfang/config.toml"
      API_KEY_FILE="/root/.openfang/.api_key"

      # 生成或读取 API Key
      if [ -f "$API_KEY_FILE" ]; then
        API_KEY=$(cat "$API_KEY_FILE")
      else
        # 简单方法：时间戳 + 随机数
        TS=$(date +%s)
        API_KEY="of_${TS}_$$"
        echo "$API_KEY" > "$API_KEY_FILE"
      fi

      # 打印 API Key 到日志
      echo ""
      echo "=========================================="
      echo "OpenFang API Key: $API_KEY"
      echo "=========================================="
      echo ""

      # 创建配置文件
      echo "api_key = \"$API_KEY\"" > "$CONFIG_FILE"
      echo 'api_listen = "0.0.0.0:4200"' >> "$CONFIG_FILE"
      echo '' >> "$CONFIG_FILE"
      echo '[default_model]' >> "$CONFIG_FILE"
      echo 'provider = "anthropic"' >> "$CONFIG_FILE"
      echo 'model = "claude-sonnet-4-20250514"' >> "$CONFIG_FILE"
      echo 'api_key_env = "ANTHROPIC_API_KEY"' >> "$CONFIG_FILE"
      echo '' >> "$CONFIG_FILE"
      echo '[network]' >> "$CONFIG_FILE"
      echo 'listen_addr = "0.0.0.0:4200"' >> "$CONFIG_FILE"
    environment:
      # OpenFang 配置
      - OPENFANG_LISTEN=0.0.0.0:4200
      - OPENFANG_HOME
      - RUST_LOG

      # LLM Provider API Keys - 至少配置一个
      - ANTHROPIC_API_KEY
      - GEMINI_API_KEY
      - GOOGLE_API_KEY
      - OPENAI_API_KEY
      - GROQ_API_KEY
      - DEEPSEEK_API_KEY
      - OPENROUTER_API_KEY
      - TOGETHER_API_KEY
      - MISTRAL_API_KEY
      - FIREWORKS_API_KEY

      # Local LLM Providers
      - OLLAMA_BASE_URL
      - VLLM_BASE_URL
      - LMSTUDIO_BASE_URL

      # Channel Tokens
      - TELEGRAM_BOT_TOKEN
      - DISCORD_BOT_TOKEN
      - SLACK_BOT_TOKEN
      - SLACK_APP_TOKEN
      - WHATSAPP_TOKEN
      - WHATSAPP_PHONE_ID
      - SIGNAL_CLI_PATH
      - SIGNAL_PHONE_NUMBER
      - MATRIX_HOMESERVER
      - MATRIX_ACCESS_TOKEN
      - EMAIL_IMAP_HOST
      - EMAIL_SMTP_HOST
      - EMAIL_USERNAME
      - EMAIL_PASSWORD
    binds:
      - /lzcapp/var/config:/root/.openfang
locales:
  en:
    name: OpenFang
    description: (LazyCat Auto-build) Open-source Agent Operating System - autonomous agents that work for you
  zh:
    name: OpenFang
    description: （懒猫微服自动构建）开源 Agent 操作系统 - 自主代理为你工作
