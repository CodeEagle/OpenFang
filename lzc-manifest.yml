lzc-sdk-version: '0.1'
package: com.selfstudio.openfang
version: 0.2.7
min_os_version: 1.3.8
name: OpenFang
description: (LazyCat Auto-build) Open-source Agent Operating System - autonomous agents that work for you
license: MIT
homepage: https://openfang.sh
author: RightNow-AI
application:
  subdomain: openfang
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://openfang:4200/
services:
  openfang:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/openfang:f4c8d047f617f6ac
    environment:
      # OpenFang 配置
      - OPENFANG_LISTEN=0.0.0.0
      # - OPENFANG_API_KEY=          # HTTP 认证 API key
      # - RUST_LOG=info              # 日志级别

      # LLM Provider API Keys - 至少配置一个
      # Anthropic (Claude models, 默认)
      # - ANTHROPIC_API_KEY=sk-ant-...
      # Google Gemini
      # - GEMINI_API_KEY=AIza...
      # OpenAI
      # - OPENAI_API_KEY=sk-...
      # Groq (fast inference)
      # - GROQ_API_KEY=gsk_...
      # DeepSeek
      # - DEEPSEEK_API_KEY=sk-...
      # OpenRouter (multi-provider gateway)
      # - OPENROUTER_API_KEY=sk-or-...
      # Together AI
      # - TOGETHER_API_KEY=...
      # Mistral AI
      # - MISTRAL_API_KEY=...
      # Fireworks AI
      # - FIREWORKS_API_KEY=...

      # Local LLM Providers (无需 API key)
      # - OLLAMA_BASE_URL=http://localhost:11434
      # - VLLM_BASE_URL=http://localhost:8000
      # - LMSTUDIO_BASE_URL=http://localhost:1234

      # Channel Tokens (可选)
      # - TELEGRAM_BOT_TOKEN=123456:ABC-...
      # - DISCORD_BOT_TOKEN=...
      # - SLACK_BOT_TOKEN=xoxb-...
      # - SLACK_APP_TOKEN=xapp-...
    binds:
      - /lzcapp/var/config:/root/.config/openfang
      - /lzcapp/var/data:/root/.local/share/openfang
locales:
  en:
    name: OpenFang
    description: (LazyCat Auto-build) Open-source Agent Operating System - autonomous agents that work for you
  zh:
    name: OpenFang
    description: （懒猫微服自动构建）开源 Agent 操作系统 - 自主代理为你工作
