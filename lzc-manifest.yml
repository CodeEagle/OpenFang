lzc-sdk-version: '0.1'
package: com.selfstudio.openfang
version: 0.3.0
min_os_version: 1.3.8
name: OpenFang
description: (LazyCat Auto-build) Open-source Agent Operating System - autonomous agents that work for you
license: MIT
homepage: https://openfang.sh
author: RightNow-AI
application:
  subdomain: openfang
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://openfang:4200/
services:
  openfang:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/openfang:0c7a4507c7d51cee
    environment:
      # OpenFang 配置
      - OPENFANG_LISTEN=0.0.0.0
      # LLM Provider API Keys - 在懒猫微服面板中配置环境变量
      # 至少需要配置一个 LLM Provider 的 API Key
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - GROQ_API_KEY
      # Channel Tokens (可选)
      - TELEGRAM_BOT_TOKEN
      - DISCORD_BOT_TOKEN
      - SLACK_BOT_TOKEN
      - SLACK_APP_TOKEN
      # 更多 LLM Provider API Keys (可选)
      # - GEMINI_API_KEY
      # - DEEPSEEK_API_KEY
      # - OPENROUTER_API_KEY
      # - TOGETHER_API_KEY
      # - MISTRAL_API_KEY
      # - FIREWORKS_API_KEY

      # 可选配置
      # - OPENFANG_API_KEY=          # HTTP 认证 API key
      # - RUST_LOG=info              # 日志级别
    binds:
      - /lzcapp/var/config:/root/.config/openfang
      - /lzcapp/var/data:/root/.local/share/openfang
locales:
  en:
    name: OpenFang
    description: (LazyCat Auto-build) Open-source Agent Operating System - autonomous agents that work for you
  zh:
    name: OpenFang
    description: （懒猫微服自动构建）开源 Agent 操作系统 - 自主代理为你工作
